services:
  - type: web
    name: kanmind-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate && python manage.py collectstatic --no-input && gunicorn kanmind.wsgi:application"
    envVars:
      - key: DEBUG
        value: 0
      - key: SECRET_KEY
        generateValue: true